<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Flight Search</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 15px; padding: 0; background-color: #1a1814; color: #e0ddd6;
        }
        .timetable-container { max-width: 800px; margin: 0 auto; }
        .timetable-header {
            background-color: #1a6cbb; color: #ffffff; padding: 12px 20px; font-size: 20px;
            font-family: 'Bebas Neue', sans-serif; font-weight: 400; letter-spacing: 2.5px; text-transform: uppercase;
            border-radius: 4px 4px 0 0; border-bottom: 3px solid #0f2447;
            display: flex; justify-content: space-between; align-items: center;
        }
        .timetable-header .sub-tag { font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 400; background: rgba(255,255,255,0.15); padding: 4px 8px; border-radius: 2px; letter-spacing: 0.5px; }
        .search-form {
            display: flex; flex-direction: column; gap: 15px; background-color: #2a2620;
            padding: 20px; border: 2px solid #1a6cbb; border-top: none;
            border-radius: 0 0 6px 6px; box-sizing: border-box; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .grid-row-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 700; color: #8fb8e0; text-transform: uppercase; letter-spacing: 0.5px; }
        select, input[type="text"], input[type="time"] { 
            padding: 8px 10px; font-size: 14px; border: 1px solid #4a4438; border-radius: 3px;
            background-color: #1a1814; height: 38px; width: 100%; box-sizing: border-box; color: #e0ddd6;
        }
        input[type="text"]:focus, select:focus, input[type="time"]:focus { border-color: #1a6cbb; outline: none; box-shadow: 0 0 0 2px rgba(26,108,187,0.25); }
        .filter-section { background-color: #221f1a; border: 1px dashed #4a4438; padding: 15px; border-radius: 6px; margin-top: 20px; display: grid; grid-template-columns: repeat(2,1fr); gap: 15px; }
        .filter-section-title { grid-column: span 2; font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 700; color: #8fb8e0; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #3a3630; padding-bottom: 5px; margin-bottom: 5px; }
        .time-block { background-color: rgba(255,255,255,0.03); padding: 10px; border-radius: 4px; border: 1px solid #3a3630; }
        .time-title { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 700; color: #999990; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
        .time-inputs { display: flex; gap: 10px; }
        .btn-row { display: flex; gap: 12px; margin-top: 5px; }
        button { padding: 12px; font-family: 'IBM Plex Mono', monospace; font-size: 13px; border: none; border-radius: 3px; cursor: pointer; font-weight: 700; flex: 2; box-sizing: border-box; text-transform: uppercase; letter-spacing: 1px; }
        #searchBtn { background-color: #1a6cbb; color: white; }
        #searchBtn:hover { background-color: #0f2447; }
        #searchBtn:disabled { background-color: #4a4438; cursor: not-allowed; color: #8a8378; }
        #clearBtn { background-color: #3a3630; color: #c9c4ba; border: 1px solid #4a4438; flex: 1; }
        #clearBtn:hover { background-color: #4a4438; }
        .cap-warning { color: #999990; border-top: 1px solid #3a3630; padding: 12px 0; margin-top: 12px; font-size: 12px; font-family: 'IBM Plex Mono', monospace; }
        .table-container { width: 100%; overflow-x: auto; margin-top: 15px; border: 2px solid #1a6cbb; border-radius: 4px; background-color: #1a1814; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 12px; font-variant-numeric: tabular-nums; }
        th { background-color: #1a6cbb; color: #ffffff; font-family: 'IBM Plex Mono', monospace; font-weight: 700; padding: 10px 8px; border-bottom: 2px solid #0f2447; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
        th.sortable { cursor: pointer; position: relative; user-select: none; }
        th.sortable:hover { background-color: #2a7fd4; }
        td { padding: 8px; border-bottom: 1px solid #2a2620; color: #d8d4cc; }
        tr:nth-child(even) { background-color: #201d18; }
        tr:hover { background-color: #2a2620; }
        .status-msg { color: #999990; font-size: 12px; font-family: 'IBM Plex Mono', monospace; margin-top: 15px; }
        .error { color: #e09090; font-size: 12px; font-family: 'IBM Plex Mono', monospace; margin-top: 15px; }
        .results-count { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 700; margin-top: 20px; color: #8fb8e0; text-transform: uppercase; letter-spacing: 1px; }
        .pagination { display: flex; align-items: center; gap: 12px; margin-top: 12px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #999990; }
        .pagination button { font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 700; padding: 5px 14px; background: #2a2620; border: 1px solid #4a4438; color: #c9c4ba; border-radius: 3px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; flex: unset; }
        .pagination button:hover { background: #3a3630; }
        .pagination button:disabled { opacity: 0.35; cursor: not-allowed; }
    </style>
</head>
<body>
<div class="timetable-container">
    <div class="timetable-header">
        <span>Flight Search</span>
        <span class="sub-tag">System Timetable Index</span>
    </div>
    <form id="flightSearchForm" class="search-form">
        <div class="grid-row-3">
            <div class="input-group"><label for="originInput">Origin</label><input type="text" id="originInput" list="originOptions" placeholder="Loading..." disabled><datalist id="originOptions"></datalist></div>
            <div class="input-group"><label for="destinationInput">Destination</label><input type="text" id="destinationInput" list="destinationOptions" placeholder="Loading..." disabled><datalist id="destinationOptions"></datalist></div>
            <div class="input-group"><label for="airlineInput">Airline</label><input type="text" id="airlineInput" list="airlineOptions" placeholder="Loading..." disabled><datalist id="airlineOptions"></datalist></div>
        </div>
        <div class="grid-row-3">
            <div class="input-group">
                <label for="seasonInput">Year *</label>
                <select id="seasonInput" disabled required><option value="" disabled selected hidden>Loading...</option></select>
            </div>
            <div class="input-group">
                <label for="dayInput">Day of Week</label>
                <select id="dayInput" disabled>
                    <option value="">All Days</option>
                    <option value="Mo">Monday</option><option value="Tu">Tuesday</option><option value="We">Wednesday</option>
                    <option value="Th">Thursday</option><option value="Fr">Friday</option><option value="Sa">Saturday</option><option value="Su">Sunday</option>
                </select>
            </div>
            <div class="input-group"></div>
        </div>
        <div class="btn-row">
            <button type="submit" id="searchBtn" disabled>Loading Form Data...</button>
            <button type="button" id="clearBtn">Clear Filters</button>
        </div>
    </form>
    <div class="filter-section">
        <div class="filter-section-title">Live Result Filters (After Search)</div>
        <div class="time-block">
            <div class="time-title">Departure Window</div>
            <div class="time-inputs">
                <div class="input-group" style="flex:1;"><label for="departAfter" style="font-size:10px;color:#555;">After</label><input type="time" id="departAfter"></div>
                <div class="input-group" style="flex:1;"><label for="departBefore" style="font-size:10px;color:#555;">Before</label><input type="time" id="departBefore"></div>
            </div>
        </div>
        <div class="time-block">
            <div class="time-title">Arrival Window</div>
            <div class="time-inputs">
                <div class="input-group" style="flex:1;"><label for="arriveAfter" style="font-size:10px;color:#555;">After</label><input type="time" id="arriveAfter"></div>
                <div class="input-group" style="flex:1;"><label for="arriveBefore" style="font-size:10px;color:#555;">Before</label><input type="time" id="arriveBefore"></div>
            </div>
        </div>
    </div>
    <div id="sheetResults"></div>
</div>
<script>
    const SUPABASE_URL = "https://monitors-proxy.sam-skardon.workers.dev";
    // API key secured via Cloudflare Worker proxy
    const HEADERS = {};
    const PAGE_SIZE = 100;
    const form = document.getElementById('flightSearchForm');
    const searchBtn = document.getElementById('searchBtn');
    const clearBtn = document.getElementById('clearBtn');
    const resultsContainer = document.getElementById('sheetResults');
    const seasonInput = document.getElementById('seasonInput');
    const dayInput = document.getElementById('dayInput');
    const originInput = document.getElementById('originInput');
    const destinationInput = document.getElementById('destinationInput');
    const airlineInput = document.getElementById('airlineInput');
    let allFetchedFlights=[], currentResultsPool=[], currentSortColumn="", isSortAscending=true, searchWasTruncated=false, activeAbortController=null, currentPage=0;
    function formatTime(t){if(!t)return'';const[h,m]=t.split(':');let hr=parseInt(h);const ap=hr>=12?'PM':'AM';if(hr===0)hr=12;else if(hr>12)hr-=12;return`${hr}:${m} ${ap}`;}
    function timeToMinutes(t){if(!t)return null;const p=t.split(':');if(p.length<2)return null;const h=parseInt(p[0]),m=parseInt(p[1]);return isNaN(h)||isNaN(m)?null:h*60+m;}
    function htmlTimeToMinutes(t){if(!t)return null;const p=t.split(':');return p.length<2?null:parseInt(p[0])*60+parseInt(p[1]);}
    function esc(s){return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
    function populateAirlineDatalist(names){const dl=document.getElementById('airlineOptions');dl.innerHTML='';names.sort().forEach(n=>{const o=document.createElement('option');o.value=n;dl.appendChild(o);});}
    // Metro support: lookup map and airport-code expansion, populated at init
    let locationLookup = {};  // display_name -> { type: 'airport'|'metro', code }
    let metroAirports  = {};  // metro_code   -> [airport_code, ...]

    function resolveLocationFilter(val, field) {
        if (!val) return null;
        const match = locationLookup[val];
        if (match && match.type === 'metro') {
            const codes = metroAirports[match.code];
            if (!codes || codes.length === 0) return null;
            return `${field}_code=in.(${codes.join(',')})`;
        }
        return `${field}_name=ilike.${encodeURIComponent('%' + val + '%')}`;
    }

    async function initializeDropdowns(){
        try{
            const[sR,aR,alR,mR]=await Promise.all([
                fetch(`${SUPABASE_URL}/seasons?select=season_code,season_label&order=season_order.asc`,{headers:HEADERS}),
                fetch(`${SUPABASE_URL}/airports?select=airport_code,display_name,metro_code&order=display_name.asc`,{headers:HEADERS}),
                fetch(`${SUPABASE_URL}/airlines?select=airline_name&order=airline_name.asc`,{headers:HEADERS}),
                fetch(`${SUPABASE_URL}/metros?select=metro_code,display_name&order=display_name.asc`,{headers:HEADERS})
            ]);
            const seasons=await sR.json(),airports=await aR.json(),airlines=await alR.json(),metros=await mR.json();

            // Build lookup and metro->airport map
            locationLookup = {};
            metroAirports  = {};
            airports.forEach(a => {
                locationLookup[a.display_name] = { type: 'airport', code: a.airport_code };
                if (a.metro_code) {
                    if (!metroAirports[a.metro_code]) metroAirports[a.metro_code] = [];
                    metroAirports[a.metro_code].push(a.airport_code);
                }
            });
            metros.forEach(m => {
                locationLookup[m.display_name] = { type: 'metro', code: m.metro_code };
            });

            // Merge and sort airports + metros into one datalist
            const allOptions = [
                ...airports.map(a => a.display_name),
                ...metros.map(m => m.display_name)
            ].sort((a,b) => a.localeCompare(b));

            seasonInput.innerHTML='<option value="" disabled selected hidden>Select a Year</option>';
            seasons.forEach(s=>{const o=document.createElement('option');o.value=s.season_code;o.textContent=s.season_label;seasonInput.appendChild(o);});
            seasonInput.disabled=false;
            ['originOptions','destinationOptions'].forEach(id=>{
                const dl=document.getElementById(id);dl.innerHTML='';
                allOptions.forEach(name=>{const o=document.createElement('option');o.value=name;dl.appendChild(o);});
            });
            populateAirlineDatalist(airlines.map(a=>a.airline_name));
            originInput.placeholder=destinationInput.placeholder='City, metro area, or airport code...';
            airlineInput.placeholder='Type to search...';
            originInput.disabled=destinationInput.disabled=airlineInput.disabled=dayInput.disabled=false;
            searchBtn.textContent='Search Flights';searchBtn.disabled=false;
        }catch(err){console.error(err);resultsContainer.innerHTML='<p class="error">Error loading search options. Please refresh.</p>';}
    }
    initializeDropdowns();
    function renderTable(flights){
        let warn='';
        if(searchWasTruncated)warn='<div class="cap-warning">&#9888; Display limit reached (2,000 flights). Narrow your search by specifying an Origin, Destination, or Airline.</div>';
        if(!flights.length){resultsContainer.innerHTML=warn+'<p class="status-msg">No non-stop flights found matching your search criteria. This route may have been served by connecting itineraries — try the <a href="https://terminalmonitors.com/itinerary-finder" target="_top" style="color:#8fb8e0;">Itinerary Finder</a> to search for 1-stop and 2-stop routings between these cities.</p>';return;}
        const totalPages=Math.ceil(flights.length/PAGE_SIZE);
        if(currentPage>=totalPages)currentPage=totalPages-1;
        const pageFlights=flights.slice(currentPage*PAGE_SIZE,(currentPage+1)*PAGE_SIZE);
        const start=currentPage*PAGE_SIZE+1, end=Math.min((currentPage+1)*PAGE_SIZE,flights.length);
        const arr=isSortAscending?' &uarr;':' &darr;';
        let h=warn+`<div class="results-count">${flights.length} flights found &nbsp;&mdash;&nbsp; showing ${start}–${end}</div><div class="table-container"><table><thead><tr>`;
        [['airline_name','Airline'],['flight','Flight'],['origin_name','Origin'],['dest_name','Destination'],['depart','Depart'],['arrive','Arrive'],['equipment','Equip.'],['frequency','Freq.']].forEach(([k,l])=>h+=`<th class="sortable" onclick="sortData('${k}')">${l}${currentSortColumn===k?arr:''}</th>`);
        h+='</tr></thead><tbody>';
        pageFlights.forEach(r=>{h+=`<tr><td>${esc(r.airline_name)}</td><td>${esc(r.flight)}</td><td>${esc(r.origin_name||r.origin_code)}</td><td>${esc(r.dest_name||r.dest_code)}</td><td>${esc(formatTime(r.depart))}</td><td>${esc(formatTime(r.arrive))}</td><td>${esc(r.equipment)}</td><td>${esc(r.frequency)}</td></tr>`;});
        h+='</tbody></table></div>';
        if(totalPages>1){
            h+=`<div class="pagination">
                <button onclick="changePage(-1)" ${currentPage===0?'disabled':''}>&#8592; Prev</button>
                <span>Page ${currentPage+1} of ${totalPages}</span>
                <button onclick="changePage(1)" ${currentPage>=totalPages-1?'disabled':''}>Next &#8594;</button>
            </div>`;
        }
        resultsContainer.innerHTML=h;
    }
    window.changePage=function(dir){currentPage+=dir;renderTable(currentResultsPool);window.scrollTo({top:0,behavior:'smooth'});};
    function applyPostSearchFilters(){currentPage=0;
        const da=htmlTimeToMinutes(document.getElementById('departAfter').value),db=htmlTimeToMinutes(document.getElementById('departBefore').value),aa=htmlTimeToMinutes(document.getElementById('arriveAfter').value),ab=htmlTimeToMinutes(document.getElementById('arriveBefore').value);
        currentResultsPool=allFetchedFlights.filter(r=>{const d=timeToMinutes(r.depart),a=timeToMinutes(r.arrive);return!(da!==null&&(d===null||d<da))&&!(db!==null&&(d===null||d>db))&&!(aa!==null&&(a===null||a<aa))&&!(ab!==null&&(a===null||a>ab));});
        currentSortColumn?executePoolSort(currentSortColumn,false):renderTable(currentResultsPool);
    }
    ['departAfter','departBefore','arriveAfter','arriveBefore'].forEach(id=>document.getElementById(id).addEventListener('input',applyPostSearchFilters));
    window.sortData=function(col){if(currentSortColumn===col)isSortAscending=!isSortAscending;else{currentSortColumn=col;isSortAscending=true;}currentPage=0;executePoolSort(col,true);};
    function executePoolSort(col,render=true){
        currentResultsPool.sort((a,b)=>{
            if(col==='depart'||col==='arrive'){const ma=timeToMinutes(a[col])??(isSortAscending?Infinity:-Infinity),mb=timeToMinutes(b[col])??(isSortAscending?Infinity:-Infinity);return isSortAscending?ma-mb:mb-ma;}
            const va=(a[col]??'').toString().trim(),vb=(b[col]??'').toString().trim();
            return isSortAscending?va.localeCompare(vb,undefined,{numeric:true,sensitivity:'base'}):vb.localeCompare(va,undefined,{numeric:true,sensitivity:'base'});
        });
        if(render)renderTable(currentResultsPool);
    }
    form.addEventListener('submit',async function(e){
        e.preventDefault();
        const selectedSeason=seasonInput.value;if(!selectedSeason){alert('Please select a Year first.');return;}
        const ov=originInput.value.trim(),dv=destinationInput.value.trim(),av=airlineInput.value.trim();
        if(!ov&&!dv&&!av){
            resultsContainer.innerHTML='<p class="status-msg">Please enter at least one additional filter — Origin, Destination, or Airline — to search.</p>';
            return;
        }
        if(activeAbortController)activeAbortController.abort();
        activeAbortController=new AbortController();const signal=activeAbortController.signal;
        allFetchedFlights=[];currentResultsPool=[];currentSortColumn='';isSortAscending=true;searchWasTruncated=false;currentPage=0;
        searchBtn.disabled=true;searchBtn.textContent='Searching...';
        resultsContainer.innerHTML=`<p class="status-msg">Searching flight records for ${esc(selectedSeason)}...</p>`;
        try{
            const filters=[`season=eq.${encodeURIComponent(selectedSeason)}`];
            const dy=dayInput.value;
            const originFilter = resolveLocationFilter(ov, 'origin');
            const destFilter   = resolveLocationFilter(dv, 'dest');
            if(originFilter) filters.push(originFilter);
            if(destFilter)   filters.push(destFilter);
            if(av)filters.push(`airline_name=ilike.${encodeURIComponent('%'+av+'%')}`);
            if(dy)filters.push(`days=ilike.${encodeURIComponent('%'+dy+'%')}`);
            const limit=1000,max=2000;let offset=0,keep=true;
            while(keep){
                const url=`${SUPABASE_URL}/flights?${filters.join('&')}&limit=${limit}&offset=${offset}&order=depart.asc`;
                const res=await fetch(url,{headers:HEADERS,signal});if(!res.ok)throw new Error(`API error: ${res.status}`);
                const batch=await res.json();allFetchedFlights=allFetchedFlights.concat(batch);
                if(batch.length<limit)keep=false;
                else if(allFetchedFlights.length>=max){keep=false;searchWasTruncated=true;}
                else{offset+=limit;resultsContainer.innerHTML=`<p class="status-msg">Retrieved ${allFetchedFlights.length} rows, continuing...</p>`;}
            }
            applyPostSearchFilters();
            logSearch({tool:'flight-search',season:selectedSeason,origin:ov||null,destination:dv||null,airline:av||null,day_of_week:dy||null,result_count:allFetchedFlights.length});
        }catch(err){if(err.name==='AbortError')return;console.error(err);resultsContainer.innerHTML='<p class="error">Error retrieving data. Please try again.</p>';}
        finally{searchBtn.disabled=false;searchBtn.textContent='Search Flights';}
    });
    function logSearch(data){
        fetch(`${SUPABASE_URL}/search_logs`,{method:'POST',headers:{...HEADERS,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(data)}).catch(()=>{});
    }
    clearBtn.addEventListener('click',function(){
        if(activeAbortController)activeAbortController.abort();
        form.reset();originInput.value=destinationInput.value=airlineInput.value='';
        seasonInput.selectedIndex=dayInput.selectedIndex=0;
        ['departAfter','departBefore','arriveAfter','arriveBefore'].forEach(id=>document.getElementById(id).value='');
        allFetchedFlights=[];currentResultsPool=[];currentSortColumn='';isSortAscending=true;searchWasTruncated=false;currentPage=0;resultsContainer.innerHTML='';
    });
</script>
</body>
</html>
